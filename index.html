<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>🎄 Christmas & New Year Countdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:Arial,sans-serif;
color:white;
background:#000;
overflow-x:hidden;
}

section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
flex-direction:column;
text-align:center;
padding:40px;
}

/* ===== CHRISTMAS ===== */
#christmas{
background:radial-gradient(circle at top,#003322,#000);
overflow:hidden;
}

.snow{
position:absolute;
inset:0;
background-image:radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
animation:snow 15s linear infinite;
opacity:.5;
}
@keyframes snow{from{background-position:0 0}to{background-position:0 1000px}}

.scene{position:relative;width:400px;height:600px}
@media(max-width:500px){.scene{transform:scale(.8)}}

.star{
position:absolute;top:0;left:50%;transform:translateX(-50%);
font-size:52px;color:gold;
animation:sparkle 1.5s infinite alternate
}
@keyframes sparkle{from{text-shadow:0 0 10px gold}to{text-shadow:0 0 35px gold}}

.tree{position:absolute;bottom:0;left:50%;transform:translateX(-50%)}

.layer{
position:relative;
width:0;height:0;
margin:0 auto;
border-left:solid transparent;
border-right:solid transparent;
border-bottom:solid #0f6b2f;
}
.top{border-left-width:80px;border-right-width:80px;border-bottom-width:120px}
.middle{margin-top:-40px;border-left-width:120px;border-right-width:120px;border-bottom-width:160px}
.bottom{margin-top:-40px;border-left-width:160px;border-right-width:160px;border-bottom-width:200px}

.trunk{width:50px;height:70px;background:#6b3e26;margin:0 auto}

.light{
position:absolute;width:10px;height:10px;border-radius:50%;
animation:blink 2s infinite;
box-shadow:0 0 8px currentColor;
}
@keyframes blink{
0%{background:red}
33%{background:green}
66%{background:blue}
100%{background:red}
}

.typing{margin-top:20px;font-size:26px}
.countdown{margin-top:10px;color:#ffeb3b}

/* ===== NEW YEAR ===== */
#newyear{
background:radial-gradient(circle at bottom,#001a33,#000);
}

canvas{
position:absolute;
inset:0;
}

.ny-box{
z-index:2;
position:relative;
}

.ny-title{
font-size:32px;
color:#00e5ff;
margin-bottom:10px;
}

.ny-countdown{
color:#fff;
font-size:20px;
}

</style>
</head>
<body>

<!-- CHRISTMAS SECTION -->
<section id="christmas">
<div class="snow"></div>

<div class="scene">
<div class="star">★</div>

<div class="tree">
<div class="layer top">
<span class="light" style="top:20px;left:10px"></span>
<span class="light" style="top:40px;left:30px"></span>
</div>
<div class="layer middle">
<span class="light" style="top:30px;left:20px"></span>
<span class="light" style="top:60px;left:50px"></span>
<span class="light" style="top:90px;left:80px"></span>
</div>
<div class="layer bottom">
<span class="light" style="top:40px;left:20px"></span>
<span class="light" style="top:80px;left:60px"></span>
<span class="light" style="top:120px;left:100px"></span>
</div>
<div class="trunk"></div>
</div>

<div class="typing" id="xmasText"></div>
<div class="countdown" id="xmasCount"></div>
</div>
</section>

<!-- NEW YEAR SECTION -->
<section id="newyear">
<canvas id="fireworks"></canvas>

<div class="ny-box">
<div class="ny-title">🎆 New Year Countdown</div>
<div class="ny-countdown" id="nyCount"></div>
</div>
</section>

<script>
/* ===== CHRISTMAS TEXT ===== */
const xmasText=document.getElementById("xmasText");
const msg="🎄 Merry Christmas 🎄";
let i=0;
(function type(){
if(i<=msg.length){
xmasText.textContent=msg.slice(0,i++);
setTimeout(type,100);
}
})();

/* ===== COUNTDOWNS ===== */
const xmasCount=document.getElementById("xmasCount");
const nyCount=document.getElementById("nyCount");

setInterval(()=>{
const now=new Date();

const christmas=new Date(`December 25, ${now.getFullYear()}`);
const cdiff=christmas-now;

xmasCount.textContent=`⏳ Christmas: ${Math.floor(cdiff/86400000)}d ${Math.floor(cdiff/3600000)%24}h ${Math.floor(cdiff/60000)%60}m ${Math.floor(cdiff/1000)%60}s`;

const newYear=new Date(`January 1, ${now.getFullYear()+1}`);
const ndiff=newYear-now;

nyCount.textContent=`⏳ ${Math.floor(ndiff/86400000)}d ${Math.floor(ndiff/3600000)%24}h ${Math.floor(ndiff/60000)%60}m ${Math.floor(ndiff/1000)%60}s`;
},1000);

/* ===== FIREWORKS ===== */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

function boom(){
const x=Math.random()*canvas.width;
const y=Math.random()*canvas.height/2;
for(let i=0;i<40;i++){
particles.push({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:100});
}
}

function animate(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;
ctx.fillStyle="hsl("+Math.random()*360+",100%,60%)";
ctx.fillRect(p.x,p.y,2,2);
if(p.life<=0)particles.splice(i,1);
});

requestAnimationFrame(animate);
}

setInterval(boom,800);
animate();
</script>

</body>
</html>
