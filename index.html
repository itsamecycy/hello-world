<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>🎄 Merry Christmas & New Year Countdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* ===== BASE ===== */
*{box-sizing:border-box;margin:0;padding:0}
body{
height:100vh;
background:radial-gradient(circle at top,#003322,#000);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:Arial,sans-serif;
color:white;
position:relative;
}

/* ===== SNOW ===== */
.snow{
position:fixed;inset:0;
background-image:radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
animation:snow 15s linear infinite;
opacity:.5;
z-index:1;
}
@keyframes snow{from{background-position:0 0}to{background-position:0 1000px}}

/* ===== FIREWORKS ===== */
canvas#fireworks{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
z-index:0;
}

/* ===== SCENES ===== */
.container{
position:relative;
z-index:2;
text-align:center;
}

.scene{
width:400px;
height:600px;
margin:auto;
position:relative;
}
@media(max-width:500px){.scene{transform:scale(.8)}}

.star{position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:52px;color:gold;animation:sparkle 1.5s infinite alternate}
@keyframes sparkle{from{text-shadow:0 0 10px gold}to{text-shadow:0 0 35px gold}}

.tree{position:absolute;bottom:0;left:50%;transform:translateX(-50%)}
.layer{position:relative;width:0;height:0;margin:0 auto;border-left:solid transparent;border-right:solid transparent;border-bottom:solid #0f6b2f}
.top{border-left-width:80px;border-right-width:80px;border-bottom-width:120px}
.middle{margin-top:-40px;border-left-width:120px;border-right-width:120px;border-bottom-width:160px}
.bottom{margin-top:-40px;border-left-width:160px;border-right-width:160px;border-bottom-width:200px}
.trunk{width:50px;height:70px;background:#6b3e26;margin:0 auto}

.light{position:absolute;width:12px;height:12px;border-radius:50%;animation:blink 2s infinite;box-shadow:0 0 10px currentColor}
@keyframes blink{0%{background:red}33%{background:green}66%{background:blue}100%{background:red}}

.typing{position:absolute;top:80px;width:100%;text-align:center;font-size:26px}
.names{position:absolute;top:120px;width:100%;text-align:center;font-size:20px;color:#ffeb3b}
.countdown{position:absolute;top:160px;width:100%;text-align:center;font-size:16px}

/* ===== NEW YEAR SECTION ===== */
.newyear{
margin-top:30px;
font-size:18px;
color:#00e5ff;
}

.share{
position:absolute;bottom:-90px;left:50%;transform:translateX(-50%);
padding:10px 20px;background:#d32f2f;color:white;
border:none;border-radius:20px;font-size:16px
}

.santa{position:fixed;top:60px;left:-100px;font-size:48px;animation:fly 15s linear infinite}
@keyframes fly{from{left:-100px}to{left:110%}}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>
<div class="snow"></div>

<div class="container">

<div class="scene">
<div class="star">★</div>

<div class="tree">
<div class="layer top"></div>
<div class="layer middle"></div>
<div class="layer bottom"></div>
<div class="trunk"></div>
</div>

<div class="typing"></div>
<div class="names"></div>
<div class="countdown"></div>
<div class="newyear"></div>
<button class="share">🎁 Share</button>
<div class="santa">🎅</div>
</div>

</div>

<script>
/* ===== CHRISTMAS TYPING ===== */
const typingEl=document.querySelector(".typing");
const text="🎄 Happy Xmas 🎄";let i=0;
(function type(){if(i<=text.length){typingEl.textContent=text.slice(0,i++);setTimeout(type,120)}})();

document.querySelector(".names").textContent="Wishing you joy, Everyone!";

/* ===== CHRISTMAS COUNTDOWN ===== */
const countdownEl=document.querySelector(".countdown");
const newYearEl=document.querySelector(".newyear");

setInterval(()=>{
const now=new Date();
const year=now.getMonth()===11&&now.getDate()>25?now.getFullYear()+1:now.getFullYear();
const christmas=new Date(`December 25, ${year}`);
const diff=christmas-now;
const d=Math.floor(diff/86400000);
const h=Math.floor(diff/3600000)%24;
const m=Math.floor(diff/60000)%60;
const s=Math.floor(diff/1000)%60;
countdownEl.textContent=`⏳ Christmas: ${d}d ${h}h ${m}m ${s}s`;

/* ===== NEW YEAR COUNTDOWN ===== */
const newYear=new Date(`January 1, ${now.getFullYear()+1}`);
const ndiff=newYear-now;
const nd=Math.floor(ndiff/86400000);
const nh=Math.floor(ndiff/3600000)%24;
const nm=Math.floor(ndiff/60000)%60;
const ns=Math.floor(ndiff/1000)%60;
newYearEl.textContent=`🎆 New Year: ${nd}d ${nh}h ${nm}m ${ns}s`;
},1000);

/* ===== SIMPLE FIREWORKS ===== */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function createFirework(){
const x=Math.random()*canvas.width;
const y=Math.random()*canvas.height/2;
for(let i=0;i<30;i++){
particles.push({
 x,y,
 vx:(Math.random()-0.5)*5,
 vy:(Math.random()-0.5)*5,
 life:100
});
}
}

function animate(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;
ctx.fillStyle="hsl("+Math.random()*360+",100%,60%)";
ctx.fillRect(p.x,p.y,2,2);
if(p.life<=0)particles.splice(i,1);
});

requestAnimationFrame(animate);
}

setInterval(createFirework,800);
animate();
</script>

</body>
</html>
